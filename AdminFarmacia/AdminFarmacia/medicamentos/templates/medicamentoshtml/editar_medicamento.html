{% extends 'pagina_base/base.html' %}
{% load static %}

{% block titulo %}Editar Medicamento{% endblock titulo %}

{% block contenido %}
<div class="container mt-4">
  <h2>Editar Medicamento</h2>

  <form method="post" class="bg-light p-4 rounded shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">Guardar cambios</button>
    <a href="{% url 'inventario:detalle_medicamento' medicamento.pk %}" class="btn btn-secondary">Volver</a>
  </form>
</div>
{% endblock contenido %}
