{% extends 'pagina_base/base.html' %}
{% load static %}

{% block titulo %}Nuevo Medicamento{% endblock titulo %}

{% block contenido %}
<div class="container mt-4">
  <h2>Agregar Medicamento</h2>
  <form method="post" class="bg-light p-4 rounded shadow-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{% url 'inventario:lista_medicamentos' %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock contenido %}
